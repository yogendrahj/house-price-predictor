name: mlops ci workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  data-processing-and-model-training:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code   
      uses: actions/checkout@v2

    - name: Set up Python 3.8
      uses: actions/setup-python@v2
      with:
        python-version: 3.8

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Data Preprocessing
      run: |
        python src/data/run_processing.py \
          --input data/raw/house_data.csv \ 
          --output data/processed/cleaned_house_data.csv

    - name: Run Feature Engineering
      run: |
        python src/features/engineer.py \
          --input data/processed/cleaned_house_data.csv \ 
          --output data/processed/featured_house_data.csv
          --preprocessor models/trained/preprocessor.pkl
    
    - name: Setup MLflow Tracking Server
      run: |
        docker run -d -p 5555:5000 ghcr.io/mlflow/mlfow:latest \
          mlflow server --host 0.0.0.0 \
          --backend-store-uri sqlite:///mlflow.db \
          --default-artifact-root /tmp/mlruns

    - name: Run Model Training
      run: |
        python src/models/train_model.py \
        --config configs/model_config.yaml \
        --data data/processed/featured_house_data.csv \
        --models-dir models \
        --mlflow-tracking-uri http://localhost:5555

    - name: Cleanup MLflow Tracking Server
      run: |
        docker stop $(docker ps -q --filter ancestor=ghcr.io/mlflow/mlflow:latest)

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push
      uses: docker/build-push-action@v3
      with:
        context: .
        file: Dockerfile
        push: true
        tags: ${{ vars.DOCKER_USERNAME }}/house-price-predictor:latest

